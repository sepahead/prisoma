[package]
name = "pid-sim"
version = "0.1.0"
edition = "2021"
description = "Deterministic object-simulation harness and Flow_gt extraction for PID-VLA"
license = "MIT"

[lib]
name = "pid_sim"
path = "src/lib.rs"

[[bin]]
name = "pid-sim-demo"
path = "src/bin/demo.rs"

[dependencies]
anyhow = "1.0"
pid-runlog = { path = "../pid-runlog" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

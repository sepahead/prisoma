<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Prisoma prism: a dark cyberpunk prism splits one incoming beam of information into three component beams — unique, redundant, and synergistic — the partial information decomposition hub.">
  <title>Prisoma — The Information Prism (one beam in, the decomposition out)</title>
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="55%" stop-color="#0e0d20"/>
      <stop offset="100%" stop-color="#070611"/>
    </linearGradient>
    <linearGradient id="fan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rim{fill:none;stroke:#a78bfa;stroke-width:2.4;stroke-linejoin:round;stroke-opacity:.9}
      .rimdark{fill:none;stroke:#161228;stroke-width:5.6;stroke-linejoin:round}
      .rimglow{fill:none;stroke:#a78bfa;stroke-width:7;stroke-linejoin:round;stroke-opacity:.2;filter:url(#glow)}
      .vtick{stroke:#a78bfa;stroke-width:2.2;stroke-linecap:round;stroke-opacity:.9}
      .facet{fill:none;stroke:#a78bfa;stroke-opacity:.14;stroke-width:1}
      .beam-in{stroke:#e2faff;stroke-width:3;stroke-linecap:round;filter:url(#glow)}
      .beam-in-glow{stroke:#e2faff;stroke-width:6;stroke-linecap:round;stroke-opacity:.25;filter:url(#glow)}
      .split{fill:#0a0918;stroke:#e2faff;stroke-width:1.6}
      .sdot{fill:#e2faff}
      .b1{stroke:#34d399}
      .b2{stroke:#fbbf24}
      .b3{stroke:#ef4444}
      .beam{stroke-width:2.2;stroke-linecap:round;filter:url(#glow)}
      .bdot1{fill:#34d399}
      .bdot2{fill:#fbbf24}
      .bdot3{fill:#ef4444}
      .s1{animation:shimmer 3.3s ease-in-out infinite}
      .s2{animation:shimmer 3.3s ease-in-out infinite;animation-delay:1.1s}
      .s3{animation:shimmer 3.3s ease-in-out infinite;animation-delay:2.2s}
      @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.45}}
      @media (prefers-reduced-motion:reduce){.s1,.s2,.s3{animation:none}}
      @media (prefers-color-scheme:light){.rimglow{stroke-opacity:.28}.rim{stroke-opacity:1}.rimdark{stroke:#2a2348}.vtick{stroke-opacity:1}}
    </style>
  </defs>

  <!-- prism body -->
  <path d="M120 30 L210 192 L30 192 Z" fill="url(#glass)"/>
  <!-- inner facets -->
  <path class="facet" d="M120 30 L84 192"/>
  <path class="facet" d="M120 30 L156 192"/>
  <path class="facet" d="M74 113 L166 113"/>

  <!-- spectral fan between the outer exit beams -->
  <path d="M118 136 L216 84 L222 178 Z" fill="url(#fan)"/>

  <!-- incoming beam: one channel of raw information -->
  <line class="beam-in-glow" x1="12" y1="88" x2="76" y2="117"/>
  <line class="beam-in" x1="12" y1="88" x2="76" y2="117"/>
  <line class="beam-in" x1="76" y1="117" x2="118" y2="136" stroke-opacity="0.85"/>

  <!-- the decomposition: unique / redundant / synergistic -->
  <g class="s1"><line class="beam b1" x1="118" y1="136" x2="216" y2="84"/><circle class="bdot1" cx="216" cy="84" r="3" filter="url(#glow)"/></g>
  <g class="s2"><line class="beam b2" x1="118" y1="136" x2="228" y2="132"/><circle class="bdot2" cx="228" cy="132" r="3" filter="url(#glow)"/></g>
  <g class="s3"><line class="beam b3" x1="118" y1="136" x2="222" y2="178"/><circle class="bdot3" cx="222" cy="178" r="3" filter="url(#glow)"/></g>

  <!-- refraction node (ecosystem diamond) -->
  <path class="split" d="M118 129 L125 136 L118 143 L111 136 Z"/>
  <circle class="sdot" cx="118" cy="136" r="1.6"/>

  <!-- rim: halo, dark under-stroke, bright core -->
  <path class="rimglow" d="M120 30 L210 192 L30 192 Z"/>
  <path class="rimdark" d="M120 30 L210 192 L30 192 Z"/>
  <path class="rim" d="M120 30 L210 192 L30 192 Z"/>
  <!-- vertex ticks -->
  <line class="vtick" x1="120" y1="16" x2="120" y2="22"/>
  <line class="vtick" x1="218" y1="199" x2="223" y2="202"/>
  <line class="vtick" x1="22" y1="199" x2="17" y2="202"/>
</svg>

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pid-core / pid-runlog live in the `pid-rs` submodule (single source of truth:
          # https://github.com/sepahead/pid-rs). Fetch it so the path-deps resolve.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --workspace -- -D warnings
      # `ncp-observer` is intentionally NOT a default workspace member (it git-depends
      # on the published NCP SDK + Zenoh, kept off prisoma's critical path), so the
      # `--workspace` clippy above never compiles it. Compile it explicitly against the
      # pinned NCP tag so a future NCP API break fails CI instead of going unnoticed.
      - name: Clippy (ncp-observer, NCP consumer — excluded from the workspace)
        run: cargo clippy --locked --manifest-path crates/ncp-observer/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --locked --workspace
      - name: Dependency firebreak (grandplan.md §8.9.3 — minimum path needs no NCP or PID atoms)
        run: |
          # The `--workspace` build/clippy/tests above never compiled `ncp-observer`
          # (workspace-excluded), proving the NCP-disabled core path; the dedicated
          # `Clippy (ncp-observer …)` step is a separate opt-in consumer check. Here we
          # Assert static factual-outcome label baselines (majority + the SAFE-class held-out
          # logistic regression) are emitted independently of PID. This is dependency groundwork,
          # not H1 response scoring or prospective H2 landmark prediction.
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_firebreak_summary.json --runlog /tmp/prisoma_firebreak_runlog.jsonl --pid-mode none
          grep -q '"majority_success_accuracy"' /tmp/prisoma_firebreak_summary.json
          grep -q '"heldout_logreg_vlda_success_accuracy"' /tmp/prisoma_firebreak_summary.json
          grep -q '"pid": "disabled"' /tmp/prisoma_firebreak_summary.json
          grep -q '"requested": 0' /tmp/prisoma_firebreak_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_firebreak_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_firebreak_runlog.jsonl | grep -q 'pid_metrics=0'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_firebreak_runlog.jsonl | grep -q 'pid_metric_events=0'
      - name: Run-log smoke
        run: |
          cargo run -p pid-sim --bin pid-h1-preflight -- --input crates/pid-sim/fixtures/h1_preflight_valid.json --summary-json /tmp/prisoma_h1_preflight_summary.json --runlog /tmp/prisoma_h1_preflight_runlog.jsonl
          grep -q '"passed": true' /tmp/prisoma_h1_preflight_summary.json
          grep -q '"establishes_h1_evidence": false' /tmp/prisoma_h1_preflight_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_h1_preflight_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_runlog.jsonl | grep -F 'pid_metrics=0' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          cp /tmp/prisoma_h1_preflight_runlog.jsonl /tmp/prisoma_h1_preflight_runlog.first.jsonl
          cargo run -p pid-sim --bin pid-h1-preflight -- --input crates/pid-sim/fixtures/h1_preflight_valid.json --summary-json /tmp/prisoma_h1_preflight_summary.json --runlog /tmp/prisoma_h1_preflight_runlog.jsonl
          cmp -s /tmp/prisoma_h1_preflight_runlog.first.jsonl /tmp/prisoma_h1_preflight_runlog.jsonl
          if cargo run -p pid-sim --bin pid-h1-preflight -- --input crates/pid-sim/fixtures/h1_preflight_invalid.json --summary-json /tmp/prisoma_h1_preflight_invalid_summary.json --runlog /tmp/prisoma_h1_preflight_invalid_runlog.jsonl; then exit 1; fi
          grep -q '"artifact_hash_mismatch"' /tmp/prisoma_h1_preflight_invalid_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_h1_preflight_invalid_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_invalid_runlog.jsonl | grep -F 'errors=1' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_invalid_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          if cargo run -p pid-sim --bin pid-h1-preflight -- --input crates/pid-sim/fixtures/h1_preflight_parse_invalid.json --summary-json /tmp/prisoma_h1_preflight_parse_invalid_summary.json --runlog /tmp/prisoma_h1_preflight_parse_invalid_runlog.jsonl; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_h1_preflight_parse_invalid_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_parse_invalid_runlog.jsonl | grep -F 'errors=1' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_preflight_parse_invalid_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          # The checked Protocol-A fixture binds these exact repo-relative artifact URIs and bytes.
          mkdir -p outputs
          cargo run -p pid-sim --bin pid-h1-preflight -- --input crates/pid-sim/fixtures/h1_preflight_valid.json --summary-json outputs/h1_preflight_summary.json --runlog outputs/h1_preflight_runlog.jsonl
          cargo run -p pid-sim --bin pid-h1-protocol-a -- --input crates/pid-sim/fixtures/h1_protocol_a_valid.json --preflight-input crates/pid-sim/fixtures/h1_preflight_valid.json --preflight-summary outputs/h1_preflight_summary.json --preflight-runlog outputs/h1_preflight_runlog.jsonl --summary-json outputs/h1_protocol_a_summary.json --runlog outputs/h1_protocol_a_runlog.jsonl
          grep -q '"passed": true' outputs/h1_protocol_a_summary.json
          grep -q '"synthetic_fixture_only": true' outputs/h1_protocol_a_summary.json
          grep -q '"establishes_h1_evidence": false' outputs/h1_protocol_a_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate outputs/h1_protocol_a_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- outputs/h1_protocol_a_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          if cargo run -p pid-sim --bin pid-h1-protocol-a -- --input crates/pid-sim/fixtures/h1_protocol_a_valid.json --preflight-input crates/pid-sim/fixtures/h1_preflight_valid.json --preflight-summary /tmp/prisoma_h1_preflight_invalid_summary.json --preflight-runlog /tmp/prisoma_h1_preflight_invalid_runlog.jsonl --summary-json /tmp/prisoma_h1_protocol_a_invalid_preflight_summary.json --runlog /tmp/prisoma_h1_protocol_a_invalid_preflight_runlog.jsonl; then exit 1; fi
          grep -q '"preflight_summary_not_eligible"' /tmp/prisoma_h1_protocol_a_invalid_preflight_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_h1_protocol_a_invalid_preflight_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_protocol_a_invalid_preflight_runlog.jsonl | grep -F 'evaluation_metric_events=0' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_protocol_a_invalid_preflight_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          if cargo run -p pid-sim --bin pid-h1-protocol-a -- --input crates/pid-sim/fixtures/h1_protocol_a_parse_invalid.json --preflight-input crates/pid-sim/fixtures/h1_preflight_valid.json --preflight-summary outputs/h1_preflight_summary.json --preflight-runlog outputs/h1_preflight_runlog.jsonl --summary-json /tmp/prisoma_h1_protocol_a_parse_invalid_summary.json --runlog /tmp/prisoma_h1_protocol_a_parse_invalid_runlog.jsonl; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_h1_protocol_a_parse_invalid_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_protocol_a_parse_invalid_runlog.jsonl | grep -F 'evaluation_metric_events=0' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_h1_protocol_a_parse_invalid_runlog.jsonl | grep -F 'pid_metric_events=0' >/dev/null
          cargo run --manifest-path pid-rs/crates/pid-core/Cargo.toml --features experimental-all --bin exp0 -- --seeds 1 --summary-json /tmp/prisoma_exp0_summary.json --runlog /tmp/prisoma_exp0_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_exp0_runlog.jsonl
          cargo run -p pid-sim --bin pid-toy-harness -- --episodes 32 --summary-json /tmp/prisoma_toy_summary.json --runlog /tmp/prisoma_toy_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_toy_runlog.jsonl
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_offline_vlda_summary.json --runlog /tmp/prisoma_offline_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'embedding_contracts=1'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'pid_metrics=4'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'pid_metric_events=4'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'geometry_metrics=20'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'geometry_metric_events=20'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'evaluation_metrics=142'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_runlog.jsonl | grep -q 'evaluation_metric_events=223'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_offline_vlda_heldout_summary.json --runlog /tmp/prisoma_offline_vlda_heldout_runlog.jsonl --require-heldout-split
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_heldout_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_heldout_runlog.jsonl | grep -q 'errors=0'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_offline_vlda_heldout_class_coverage_summary.json --runlog /tmp/prisoma_offline_vlda_heldout_class_coverage_runlog.jsonl --require-heldout-class-coverage
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_heldout_class_coverage_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_heldout_class_coverage_runlog.jsonl | grep -q 'errors=0'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_offline_vlda_heldout_episode_disjoint_summary.json --runlog /tmp/prisoma_offline_vlda_heldout_episode_disjoint_runlog.jsonl --require-heldout-episode-disjoint
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_heldout_episode_disjoint_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_heldout_episode_disjoint_runlog.jsonl | grep -q 'errors=0'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/prisoma_offline_vlda_unlabeled.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              sample["labels"].pop("success", None)
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/prisoma_offline_vlda_unlabeled.json --summary-json /tmp/prisoma_offline_vlda_unlabeled_summary.json --runlog /tmp/prisoma_offline_vlda_unlabeled_runlog.jsonl --require-success-labels; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_unlabeled_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_unlabeled_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/prisoma_offline_vlda_unsplit.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              sample.get("metadata", {}).pop("split", None)
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/prisoma_offline_vlda_unsplit.json --summary-json /tmp/prisoma_offline_vlda_unsplit_summary.json --runlog /tmp/prisoma_offline_vlda_unsplit_runlog.jsonl --require-heldout-split; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_unsplit_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_unsplit_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/prisoma_offline_vlda_uncovered_class.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              if sample.get("metadata", {}).get("split") == "test":
                  sample["labels"]["success"] = True
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/prisoma_offline_vlda_uncovered_class.json --summary-json /tmp/prisoma_offline_vlda_uncovered_class_summary.json --runlog /tmp/prisoma_offline_vlda_uncovered_class_runlog.jsonl --require-heldout-class-coverage; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_uncovered_class_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_uncovered_class_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/prisoma_offline_vlda_leaky_episode.json"
          with open(src) as f:
              data = json.load(f)
          train_episode = data["samples"][0]["episode_id"]
          for sample in data["samples"]:
              if sample.get("metadata", {}).get("split") == "test":
                  sample["episode_id"] = train_episode
                  break
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/prisoma_offline_vlda_leaky_episode.json --summary-json /tmp/prisoma_offline_vlda_leaky_episode_summary.json --runlog /tmp/prisoma_offline_vlda_leaky_episode_runlog.jsonl --require-heldout-episode-disjoint; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_leaky_episode_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_leaky_episode_runlog.jsonl | grep -q 'errors=1'
          if cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/prisoma_offline_vlda_strict_summary.json --runlog /tmp/prisoma_offline_vlda_strict_runlog.jsonl --require-geometry-pass; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_offline_vlda_strict_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_offline_vlda_strict_runlog.jsonl | grep -q 'errors=1'
          cargo run -p pid-bridge --bin pid-bridge-contract -- --out /tmp/prisoma_bridge_runlog_contract.json
          cargo run -p pid-sim --bin pid-sim-bridge-demo -- /tmp/prisoma_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --compare /tmp/prisoma_bridge_demo.jsonl /tmp/prisoma_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --summary-json /tmp/prisoma_bridge_demo.jsonl /tmp/prisoma_bridge_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --manifest-json /tmp/prisoma_bridge_demo.jsonl /tmp/prisoma_bridge_manifest.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --write-sidecars /tmp/prisoma_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --verify-sidecars /tmp/prisoma_bridge_demo.jsonl
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/prisoma_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_demo.jsonl | grep -q 'flow_pred_records=10'
          cargo run -p pid-rerun --bin runlog-to-rerun -- /tmp/prisoma_bridge_demo.jsonl --save /tmp/prisoma_bridge_demo.rrd
          EXPORT_OUT="$(mktemp)"
          printf '%s\n' '{"jsonrpc":"2.0","id":"export","method":"export.rerun","params":{"run_log_uri":"/tmp/prisoma_bridge_demo.jsonl","output_uri":"/tmp/prisoma_bridge_export.rrd"}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- /tmp/prisoma_bridge_export_stdio.jsonl | tee "$EXPORT_OUT"
          grep -q '"id":"export"' "$EXPORT_OUT"
          grep -q '"sha256"' "$EXPORT_OUT"
          test -s /tmp/prisoma_bridge_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_bridge_export_stdio.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_export_stdio.jsonl | grep -q 'artifacts=1'
          printf '%s\n' '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}' '{"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}}' '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}' '{"jsonrpc":"2.0","id":"stop","method":"log.stop","params":{}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- /tmp/prisoma_bridge_stdio.jsonl
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/prisoma_bridge_stdio.jsonl
          SAFE_OUT="$(mktemp)"
          printf '%s\n' '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}' '{"jsonrpc":"2.0","id":"replay","method":"log.replay","params":{"run_log_uri":"/tmp/prisoma_bridge_demo.jsonl"}}' '{"jsonrpc":"2.0","id":"safe-export","method":"export.rerun","params":{"run_log_uri":"/tmp/prisoma_bridge_demo.jsonl","output_uri":"/tmp/prisoma_bridge_safe_export.rrd"}}' '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- --safe-mode /tmp/prisoma_bridge_stdio_safe.jsonl | tee "$SAFE_OUT"
          grep -q '"id":"replay"' "$SAFE_OUT"
          grep -q '"trace_hash"' "$SAFE_OUT"
          grep -q 'bridge safe mode blocked method export.rerun' "$SAFE_OUT"
          grep -q 'bridge safe mode blocked method sim.step' "$SAFE_OUT"
          test ! -e /tmp/prisoma_bridge_safe_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_bridge_stdio_safe.jsonl
          TCP_PORT="$(python - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"
          cargo run -p pid-sim --bin pid-sim-bridge-tcp -- --bind "127.0.0.1:${TCP_PORT}" /tmp/prisoma_bridge_tcp.jsonl &
          TCP_PID="$!"
          python - <<'PY' "$TCP_PORT" > /tmp/prisoma_bridge_tcp.out
          import socket, sys, time
          port = int(sys.argv[1])
          deadline = time.time() + 30
          while True:
              try:
                  sock = socket.create_connection(("127.0.0.1", port), timeout=1)
                  break
              except OSError:
                  if time.time() > deadline:
                      raise
                  time.sleep(0.2)
          with sock:
              for line in [
                  '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}\n',
                  '{"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}}\n',
                  '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}\n',
                  '{"jsonrpc":"2.0","id":"stop","method":"log.stop","params":{}}\n',
              ]:
                  sock.sendall(line.encode())
              sock.shutdown(socket.SHUT_WR)
              chunks = []
              while True:
                  chunk = sock.recv(4096)
                  if not chunk:
                      break
                  chunks.append(chunk)
          print(b"".join(chunks).decode(), end="")
          PY
          wait "$TCP_PID"
          grep -q '"id":"status"' /tmp/prisoma_bridge_tcp.out
          grep -q '"id":"intervention"' /tmp/prisoma_bridge_tcp.out
          grep -q '"id":"step"' /tmp/prisoma_bridge_tcp.out
          grep -q '"id":"stop"' /tmp/prisoma_bridge_tcp.out
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_bridge_tcp.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_tcp.jsonl | grep -q 'flow_pred_records=2'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_tcp.jsonl | grep -q 'interventions=1'
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/prisoma_bridge_tcp.jsonl
          WS_PORT="$(python - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"
          cargo run -p pid-sim --bin pid-sim-bridge-ws -- --bind "127.0.0.1:${WS_PORT}" /tmp/prisoma_bridge_ws.jsonl &
          WS_PID="$!"
          python - <<'PY' "$WS_PORT" > /tmp/prisoma_bridge_ws.out
          import base64, hashlib, json, os, socket, struct, sys, time
          port = int(sys.argv[1])
          deadline = time.time() + 30
          while True:
              try:
                  sock = socket.create_connection(("127.0.0.1", port), timeout=1)
                  break
              except OSError:
                  if time.time() > deadline:
                      raise
                  time.sleep(0.2)
          def send_frame(sock, opcode, payload):
              if isinstance(payload, str):
                  payload = payload.encode()
              key = b"\x01\x02\x03\x04"
              n = len(payload)
              if n < 126:
                  header = bytes([0x80 | opcode, 0x80 | n])
              elif n < 65536:
                  header = bytes([0x80 | opcode, 0x80 | 126]) + struct.pack("!H", n)
              else:
                  header = bytes([0x80 | opcode, 0x80 | 127]) + struct.pack("!Q", n)
              sock.sendall(header + key + bytes(b ^ key[i % 4] for i, b in enumerate(payload)))
          def recv_frame(sock):
              first, second = sock.recv(2)
              opcode = first & 0x0F
              n = second & 0x7F
              if n == 126:
                  n = struct.unpack("!H", sock.recv(2))[0]
              elif n == 127:
                  n = struct.unpack("!Q", sock.recv(8))[0]
              payload = b""
              while len(payload) < n:
                  payload += sock.recv(n - len(payload))
              return opcode, payload
          with sock:
              key = base64.b64encode(os.urandom(16)).decode()
              sock.sendall((f"GET /bridge HTTP/1.1\r\nHost: 127.0.0.1:{port}\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: {key}\r\nSec-WebSocket-Version: 13\r\n\r\n").encode())
              response = b""
              while b"\r\n\r\n" not in response:
                  response += sock.recv(4096)
              expected = base64.b64encode(hashlib.sha1((key + "258EAFA5-E914-47DA-95CA-C5AB0DC85B11").encode()).digest()).decode()
              assert b"101 Switching Protocols" in response
              assert f"Sec-WebSocket-Accept: {expected}".encode() in response
              for request in [
                  {"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}},
                  {"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}},
                  {"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}},
                  {"jsonrpc":"2.0","id":"export","method":"export.rerun","params":{"run_log_uri":"/tmp/prisoma_bridge_demo.jsonl","output_uri":"/tmp/prisoma_bridge_ws_export.rrd"}},
              ]:
                  send_frame(sock, 0x1, json.dumps(request, separators=(",", ":")))
                  opcode, payload = recv_frame(sock)
                  assert opcode == 0x1
                  print(payload.decode())
              send_frame(sock, 0x8, b"")
              recv_frame(sock)
          PY
          wait "$WS_PID"
          grep -q '"id":"status"' /tmp/prisoma_bridge_ws.out
          grep -q '"id":"intervention"' /tmp/prisoma_bridge_ws.out
          grep -q '"id":"step"' /tmp/prisoma_bridge_ws.out
          grep -q '"id":"export"' /tmp/prisoma_bridge_ws.out
          grep -q '"sha256"' /tmp/prisoma_bridge_ws.out
          test -s /tmp/prisoma_bridge_ws_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_bridge_ws.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_ws.jsonl | grep -q 'flow_pred_records=2'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_ws.jsonl | grep -q 'interventions=1'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_bridge_ws.jsonl | grep -q 'artifacts=1'
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/prisoma_bridge_ws.jsonl

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # ncp-observer git-deps NCP/Zenoh and the default members path-dep the pid-rs
          # submodule; fetch it so the manifests resolve. The vendored `.external/repos/*`
          # trees are NOT part of either dependency graph, so cargo-deny never walks them.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      # cargo-deny over the default workspace (members in Cargo.toml; ncp-observer and the
      # pid-rs submodule are workspace-excluded and are NOT scanned by this invocation).
      # Fails closed: the action exits non-zero on any deny-level finding (advisory,
      # disallowed license, unknown git source, …) per ./deny.toml.
      - name: cargo-deny (workspace)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --locked
      # ncp-observer is workspace-EXCLUDED (it pulls in NCP + Zenoh, deliberately off the
      # critical path) so it needs an explicit pass via --manifest-path. Same deny.toml.
      - name: cargo-deny (ncp-observer)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # `--manifest-path` is a cargo-deny GLOBAL flag, so it must be the action's
          # dedicated `manifest-path:` input — putting it in `arguments:` makes the action
          # pass it twice (it always sets `--manifest-path ./Cargo.toml` first) and cargo-deny
          # rejects the duplicate, so this pass would never actually scan ncp-observer.
          manifest-path: crates/ncp-observer/Cargo.toml
          arguments: --locked

  rapier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-sim path-depends into the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy (rapier feature)
        run: cargo clippy --locked -p pid-sim --features rapier --all-targets -- -D warnings
      - name: Physics + manipulation tests (rapier feature)
        run: |
          cargo test --locked -p pid-sim --features rapier physics::
          cargo test --locked -p pid-sim --features rapier manipulation::
      - name: Rapier manipulation harness smoke
        run: |
          cargo run -p pid-sim --features rapier --bin pid-rapier-harness -- \
            --runlog /tmp/prisoma_rapier_push.jsonl --summary-json /tmp/prisoma_rapier_push.json --push-impulse 0.18
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/prisoma_rapier_push.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_rapier_push.jsonl | grep -q 'errors=0'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/prisoma_rapier_push.jsonl | grep -q 'flow_gt_records=301'

  parallel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # builds pid-core from the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy (parallel feature)
        run: cargo clippy --locked --manifest-path pid-rs/crates/pid-core/Cargo.toml --features parallel --all-targets -- -D warnings
      - name: pid-core tests under the exact parallel KSG path
        run: cargo test --locked --manifest-path pid-rs/crates/pid-core/Cargo.toml --features parallel

  experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-sim path-depends into the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: python -m pip install numpy pytest
      - name: Experiment unit tests (SAFE adapter + attribution probe)
        run: python -m pytest tests/python/test_safe_adapter.py tests/python/test_attribution.py -q
      - name: SAFE adapter -> offline-harness contract round-trip
        run: |
          python -m experiments.safe_adapter synth --out /tmp/safe_synth
          python -m experiments.safe_adapter convert --rollouts /tmp/safe_synth --out /tmp/safe_vlda.json --seen-tasks 0,1
          python -m experiments.safe_adapter verify --input /tmp/safe_vlda.json
          cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/safe_vlda.json --summary-json /tmp/safe_vlda_summary.json --runlog /tmp/safe_vlda_runlog.jsonl --require-heldout-split --require-heldout-class-coverage --require-heldout-episode-disjoint
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/safe_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/safe_vlda_runlog.jsonl | grep -q 'errors=0'
      - name: Attribution probe -> attribution_logged run log
        run: |
          python -m experiments.attribution demo --runlog /tmp/attr_runlog.jsonl --artifacts /tmp/attr_artifacts
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/attr_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/attr_runlog.jsonl | grep -q 'attributions=2'
      - name: Third-party notices are up to date
        run: python scripts/generate_third_party_notices.py --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit grandplan titles
        run: python scripts/audit_grandplan.py --check-italic-titles
      - name: Audit grandplan claims
        run: python scripts/audit_grandplan_claims.py
      - name: Audit docset claims
        run: python scripts/audit_docset_claims.py
      - name: Audit repository truth against pinned dependencies
        run: python scripts/audit_repo_truth.py

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff
        run: ruff check .

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-python lives in the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: python -m pip install maturin pytest numpy
      - name: Build extension in editable mode
        # `maturin develop` refuses to run outside a virtualenv; create one and
        # carry it into the following steps via GITHUB_ENV/GITHUB_PATH.
        run: |
          python -m venv .ci-venv
          source .ci-venv/bin/activate
          python -m pip install maturin pytest numpy
          maturin develop --manifest-path pid-rs/crates/pid-python/Cargo.toml
          echo "VIRTUAL_ENV=$PWD/.ci-venv" >> "$GITHUB_ENV"
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"
      - name: Python tests
        run: pytest tests/python -q

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pid-core / pid-runlog live in the `pid-rs` submodule (single source of truth:
          # https://github.com/sepehrmn/pid-rs). Fetch it so the path-deps resolve.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Run-log smoke
        run: |
          cargo run --manifest-path pid-rs/crates/pid-core/Cargo.toml --bin exp0 -- --seeds 1 --summary-json /tmp/pid_vla_exp0_summary.json --runlog /tmp/pid_vla_exp0_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_exp0_runlog.jsonl
          cargo run -p pid-sim --bin pid-toy-harness -- --episodes 32 --summary-json /tmp/pid_vla_toy_summary.json --runlog /tmp/pid_vla_toy_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_toy_runlog.jsonl
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/pid_vla_offline_vlda_summary.json --runlog /tmp/pid_vla_offline_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'embedding_contracts=1'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'pid_metrics=42'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'pid_metric_events=42'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'geometry_metrics=21'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'geometry_metric_events=21'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'evaluation_metrics=142'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_runlog.jsonl | grep -q 'evaluation_metric_events=223'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/pid_vla_offline_vlda_heldout_summary.json --runlog /tmp/pid_vla_offline_vlda_heldout_runlog.jsonl --require-heldout-split
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_heldout_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_heldout_runlog.jsonl | grep -q 'errors=0'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/pid_vla_offline_vlda_heldout_class_coverage_summary.json --runlog /tmp/pid_vla_offline_vlda_heldout_class_coverage_runlog.jsonl --require-heldout-class-coverage
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_heldout_class_coverage_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_heldout_class_coverage_runlog.jsonl | grep -q 'errors=0'
          cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/pid_vla_offline_vlda_heldout_episode_disjoint_summary.json --runlog /tmp/pid_vla_offline_vlda_heldout_episode_disjoint_runlog.jsonl --require-heldout-episode-disjoint
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_heldout_episode_disjoint_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_heldout_episode_disjoint_runlog.jsonl | grep -q 'errors=0'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/pid_vla_offline_vlda_unlabeled.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              sample["labels"].pop("success", None)
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/pid_vla_offline_vlda_unlabeled.json --summary-json /tmp/pid_vla_offline_vlda_unlabeled_summary.json --runlog /tmp/pid_vla_offline_vlda_unlabeled_runlog.jsonl --require-success-labels; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_unlabeled_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_unlabeled_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/pid_vla_offline_vlda_unsplit.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              sample.get("metadata", {}).pop("split", None)
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/pid_vla_offline_vlda_unsplit.json --summary-json /tmp/pid_vla_offline_vlda_unsplit_summary.json --runlog /tmp/pid_vla_offline_vlda_unsplit_runlog.jsonl --require-heldout-split; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_unsplit_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_unsplit_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/pid_vla_offline_vlda_uncovered_class.json"
          with open(src) as f:
              data = json.load(f)
          for sample in data["samples"]:
              if sample.get("metadata", {}).get("split") == "test":
                  sample["labels"]["success"] = True
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/pid_vla_offline_vlda_uncovered_class.json --summary-json /tmp/pid_vla_offline_vlda_uncovered_class_summary.json --runlog /tmp/pid_vla_offline_vlda_uncovered_class_runlog.jsonl --require-heldout-class-coverage; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_uncovered_class_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_uncovered_class_runlog.jsonl | grep -q 'errors=1'
          python - <<'PY'
          import json
          src = "crates/pid-sim/fixtures/offline_vlda_fixture.json"
          dst = "/tmp/pid_vla_offline_vlda_leaky_episode.json"
          with open(src) as f:
              data = json.load(f)
          train_episode = data["samples"][0]["episode_id"]
          for sample in data["samples"]:
              if sample.get("metadata", {}).get("split") == "test":
                  sample["episode_id"] = train_episode
                  break
          with open(dst, "w") as f:
              json.dump(data, f)
          PY
          if cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/pid_vla_offline_vlda_leaky_episode.json --summary-json /tmp/pid_vla_offline_vlda_leaky_episode_summary.json --runlog /tmp/pid_vla_offline_vlda_leaky_episode_runlog.jsonl --require-heldout-episode-disjoint; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_leaky_episode_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_leaky_episode_runlog.jsonl | grep -q 'errors=1'
          if cargo run -p pid-sim --bin pid-offline-harness -- --input crates/pid-sim/fixtures/offline_vlda_fixture.json --summary-json /tmp/pid_vla_offline_vlda_strict_summary.json --runlog /tmp/pid_vla_offline_vlda_strict_runlog.jsonl --require-geometry-pass; then exit 1; fi
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_offline_vlda_strict_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_offline_vlda_strict_runlog.jsonl | grep -q 'errors=1'
          cargo run -p pid-bridge --bin pid-bridge-contract -- --out /tmp/pid_vla_bridge_runlog_contract.json
          cargo run -p pid-sim --bin pid-sim-bridge-demo -- /tmp/pid_vla_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --compare /tmp/pid_vla_bridge_demo.jsonl /tmp/pid_vla_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --summary-json /tmp/pid_vla_bridge_demo.jsonl /tmp/pid_vla_bridge_summary.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --manifest-json /tmp/pid_vla_bridge_demo.jsonl /tmp/pid_vla_bridge_manifest.json
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --write-sidecars /tmp/pid_vla_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --verify-sidecars /tmp/pid_vla_bridge_demo.jsonl
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/pid_vla_bridge_demo.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_demo.jsonl | grep -q 'flow_pred_records=10'
          cargo run -p pid-rerun --bin runlog-to-rerun -- /tmp/pid_vla_bridge_demo.jsonl --save /tmp/pid_vla_bridge_demo.rrd
          EXPORT_OUT="$(mktemp)"
          printf '%s\n' '{"jsonrpc":"2.0","id":"export","method":"export.rerun","params":{"run_log_uri":"/tmp/pid_vla_bridge_demo.jsonl","output_uri":"/tmp/pid_vla_bridge_export.rrd"}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- /tmp/pid_vla_bridge_export_stdio.jsonl | tee "$EXPORT_OUT"
          grep -q '"id":"export"' "$EXPORT_OUT"
          grep -q '"sha256"' "$EXPORT_OUT"
          test -s /tmp/pid_vla_bridge_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_bridge_export_stdio.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_export_stdio.jsonl | grep -q 'artifacts=1'
          printf '%s\n' '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}' '{"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}}' '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}' '{"jsonrpc":"2.0","id":"stop","method":"log.stop","params":{}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- /tmp/pid_vla_bridge_stdio.jsonl
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/pid_vla_bridge_stdio.jsonl
          SAFE_OUT="$(mktemp)"
          printf '%s\n' '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}' '{"jsonrpc":"2.0","id":"replay","method":"log.replay","params":{"run_log_uri":"/tmp/pid_vla_bridge_demo.jsonl"}}' '{"jsonrpc":"2.0","id":"safe-export","method":"export.rerun","params":{"run_log_uri":"/tmp/pid_vla_bridge_demo.jsonl","output_uri":"/tmp/pid_vla_bridge_safe_export.rrd"}}' '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}' | cargo run -p pid-sim --bin pid-sim-bridge-stdio -- --safe-mode /tmp/pid_vla_bridge_stdio_safe.jsonl | tee "$SAFE_OUT"
          grep -q '"id":"replay"' "$SAFE_OUT"
          grep -q '"trace_hash"' "$SAFE_OUT"
          grep -q 'bridge safe mode blocked method export.rerun' "$SAFE_OUT"
          grep -q 'bridge safe mode blocked method sim.step' "$SAFE_OUT"
          test ! -e /tmp/pid_vla_bridge_safe_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_bridge_stdio_safe.jsonl
          TCP_PORT="$(python - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"
          cargo run -p pid-sim --bin pid-sim-bridge-tcp -- --bind "127.0.0.1:${TCP_PORT}" /tmp/pid_vla_bridge_tcp.jsonl &
          TCP_PID="$!"
          python - <<'PY' "$TCP_PORT" > /tmp/pid_vla_bridge_tcp.out
          import socket, sys, time
          port = int(sys.argv[1])
          deadline = time.time() + 30
          while True:
              try:
                  sock = socket.create_connection(("127.0.0.1", port), timeout=1)
                  break
              except OSError:
                  if time.time() > deadline:
                      raise
                  time.sleep(0.2)
          with sock:
              for line in [
                  '{"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}}\n',
                  '{"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}}\n',
                  '{"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}}\n',
                  '{"jsonrpc":"2.0","id":"stop","method":"log.stop","params":{}}\n',
              ]:
                  sock.sendall(line.encode())
              sock.shutdown(socket.SHUT_WR)
              chunks = []
              while True:
                  chunk = sock.recv(4096)
                  if not chunk:
                      break
                  chunks.append(chunk)
          print(b"".join(chunks).decode(), end="")
          PY
          wait "$TCP_PID"
          grep -q '"id":"status"' /tmp/pid_vla_bridge_tcp.out
          grep -q '"id":"intervention"' /tmp/pid_vla_bridge_tcp.out
          grep -q '"id":"step"' /tmp/pid_vla_bridge_tcp.out
          grep -q '"id":"stop"' /tmp/pid_vla_bridge_tcp.out
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_bridge_tcp.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_tcp.jsonl | grep -q 'flow_pred_records=2'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_tcp.jsonl | grep -q 'interventions=1'
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/pid_vla_bridge_tcp.jsonl
          WS_PORT="$(python - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"
          cargo run -p pid-sim --bin pid-sim-bridge-ws -- --bind "127.0.0.1:${WS_PORT}" /tmp/pid_vla_bridge_ws.jsonl &
          WS_PID="$!"
          python - <<'PY' "$WS_PORT" > /tmp/pid_vla_bridge_ws.out
          import base64, hashlib, json, os, socket, struct, sys, time
          port = int(sys.argv[1])
          deadline = time.time() + 30
          while True:
              try:
                  sock = socket.create_connection(("127.0.0.1", port), timeout=1)
                  break
              except OSError:
                  if time.time() > deadline:
                      raise
                  time.sleep(0.2)
          def send_frame(sock, opcode, payload):
              if isinstance(payload, str):
                  payload = payload.encode()
              key = b"\x01\x02\x03\x04"
              n = len(payload)
              if n < 126:
                  header = bytes([0x80 | opcode, 0x80 | n])
              elif n < 65536:
                  header = bytes([0x80 | opcode, 0x80 | 126]) + struct.pack("!H", n)
              else:
                  header = bytes([0x80 | opcode, 0x80 | 127]) + struct.pack("!Q", n)
              sock.sendall(header + key + bytes(b ^ key[i % 4] for i, b in enumerate(payload)))
          def recv_frame(sock):
              first, second = sock.recv(2)
              opcode = first & 0x0F
              n = second & 0x7F
              if n == 126:
                  n = struct.unpack("!H", sock.recv(2))[0]
              elif n == 127:
                  n = struct.unpack("!Q", sock.recv(8))[0]
              payload = b""
              while len(payload) < n:
                  payload += sock.recv(n - len(payload))
              return opcode, payload
          with sock:
              key = base64.b64encode(os.urandom(16)).decode()
              sock.sendall((f"GET /bridge HTTP/1.1\r\nHost: 127.0.0.1:{port}\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: {key}\r\nSec-WebSocket-Version: 13\r\n\r\n").encode())
              response = b""
              while b"\r\n\r\n" not in response:
                  response += sock.recv(4096)
              expected = base64.b64encode(hashlib.sha1((key + "258EAFA5-E914-47DA-95CA-C5AB0DC85B11").encode()).digest()).decode()
              assert b"101 Switching Protocols" in response
              assert f"Sec-WebSocket-Accept: {expected}".encode() in response
              for request in [
                  {"jsonrpc":"2.0","id":"status","method":"sim.status","params":{}},
                  {"jsonrpc":"2.0","id":"intervention","method":"intervention.apply","params":{"intervention_type":"set_velocity","payload":{"object_id":"red_cube","velocity":[0.2,0.0,0.0]}}},
                  {"jsonrpc":"2.0","id":"step","method":"sim.step","params":{"dt":0.1}},
                  {"jsonrpc":"2.0","id":"export","method":"export.rerun","params":{"run_log_uri":"/tmp/pid_vla_bridge_demo.jsonl","output_uri":"/tmp/pid_vla_bridge_ws_export.rrd"}},
              ]:
                  send_frame(sock, 0x1, json.dumps(request, separators=(",", ":")))
                  opcode, payload = recv_frame(sock)
                  assert opcode == 0x1
                  print(payload.decode())
              send_frame(sock, 0x8, b"")
              recv_frame(sock)
          PY
          wait "$WS_PID"
          grep -q '"id":"status"' /tmp/pid_vla_bridge_ws.out
          grep -q '"id":"intervention"' /tmp/pid_vla_bridge_ws.out
          grep -q '"id":"step"' /tmp/pid_vla_bridge_ws.out
          grep -q '"id":"export"' /tmp/pid_vla_bridge_ws.out
          grep -q '"sha256"' /tmp/pid_vla_bridge_ws.out
          test -s /tmp/pid_vla_bridge_ws_export.rrd
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_bridge_ws.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_ws.jsonl | grep -q 'flow_pred_records=2'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_ws.jsonl | grep -q 'interventions=1'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_bridge_ws.jsonl | grep -q 'artifacts=1'
          cargo run -p pid-sim --bin pid-sim-verify -- /tmp/pid_vla_bridge_ws.jsonl

  rapier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-sim path-depends into the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy (rapier feature)
        run: cargo clippy -p pid-sim --features rapier --all-targets -- -D warnings
      - name: Physics + manipulation tests (rapier feature)
        run: cargo test -p pid-sim --features rapier physics:: manipulation::
      - name: Rapier manipulation harness smoke
        run: |
          cargo run -p pid-sim --features rapier --bin pid-rapier-harness -- \
            --runlog /tmp/pid_vla_rapier_push.jsonl --summary-json /tmp/pid_vla_rapier_push.json --push-impulse 0.18
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/pid_vla_rapier_push.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_rapier_push.jsonl | grep -q 'errors=0'
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/pid_vla_rapier_push.jsonl | grep -q 'flow_gt_records=301'

  parallel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # builds pid-core from the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy (parallel feature)
        run: cargo clippy --manifest-path pid-rs/crates/pid-core/Cargo.toml --features parallel --all-targets -- -D warnings
      - name: pid-core tests under the exact parallel KSG path
        run: cargo test --manifest-path pid-rs/crates/pid-core/Cargo.toml --features parallel

  experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-sim path-depends into the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: python -m pip install numpy pytest
      - name: Experiment unit tests (SAFE adapter + attribution probe)
        run: python -m pytest tests/python/test_safe_adapter.py tests/python/test_attribution.py -q
      - name: SAFE adapter -> offline-harness contract round-trip
        run: |
          python -m experiments.safe_adapter synth --out /tmp/safe_synth
          python -m experiments.safe_adapter convert --rollouts /tmp/safe_synth --out /tmp/safe_vlda.json --seen-tasks 0,1
          python -m experiments.safe_adapter verify --input /tmp/safe_vlda.json
          cargo run -p pid-sim --bin pid-offline-harness -- --input /tmp/safe_vlda.json --summary-json /tmp/safe_vlda_summary.json --runlog /tmp/safe_vlda_runlog.jsonl --require-heldout-split --require-heldout-class-coverage --require-heldout-episode-disjoint
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/safe_vlda_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/safe_vlda_runlog.jsonl | grep -q 'errors=0'
      - name: Attribution probe -> attribution_logged run log
        run: |
          python -m experiments.attribution demo --runlog /tmp/attr_runlog.jsonl --artifacts /tmp/attr_artifacts
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- --validate /tmp/attr_runlog.jsonl
          cargo run --manifest-path pid-rs/crates/pid-runlog/Cargo.toml --bin pid-runlog-replay -- /tmp/attr_runlog.jsonl | grep -q 'attributions=2'
      - name: Third-party notices are up to date
        run: python scripts/generate_third_party_notices.py --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit grandplan titles
        run: python scripts/audit_grandplan.py --check-italic-titles
      - name: Audit grandplan claims
        run: python scripts/audit_grandplan_claims.py
      - name: Audit docset claims
        run: python scripts/audit_docset_claims.py

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff
        run: ruff check .

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # pid-python lives in the pid-rs submodule
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: python -m pip install maturin pytest numpy
      - name: Build extension in editable mode
        run: maturin develop --manifest-path pid-rs/crates/pid-python/Cargo.toml
      - name: Python tests
        run: pytest tests/python -q

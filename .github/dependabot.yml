version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # This manifest is intentionally workspace-excluded and has its own lockfile.
  - package-ecosystem: cargo
    directory: "/crates/ncp-observer"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: nix
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7

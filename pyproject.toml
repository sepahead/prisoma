[project]
name = "pid-vla"
version = "0.1.0"
description = "Wibral-group shared-exclusions PID (I^sx_∩) for VLA diagnostics"
readme = "README.md"
requires-python = ">=3.11"

# Keep the default dependency set minimal; add groups as needed.
dependencies = []

[dependency-groups]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
]

analysis = [
  "numpy>=1.26",
  "scipy>=1.11",
  "pandas>=2.2",
  "matplotlib>=3.8",
  "seaborn>=0.13",
]

report = [
  "reportlab>=4.0",
]

[tool.uv]
default-groups = ["dev", "analysis"]

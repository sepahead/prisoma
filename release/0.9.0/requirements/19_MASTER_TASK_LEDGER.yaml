        scientifically valid?
      finding: ''
      evidence: ''
      status: OPEN
    L06:
      name: Type and state integrity
      question: Can invalid study, split, episode, run-log, capture, intervention, model, or protocol states be represented or silently promoted?
      finding: ''
      evidence: ''
      status: OPEN
    L07:
      name: Time, ordering, and replay
      question: Are source time, receipt time, landmark time, treatment time, outcome time, censoring time, epoch, sequence, restart, and replay
        semantics unambiguous?
      finding: ''
      evidence: ''
      status: OPEN

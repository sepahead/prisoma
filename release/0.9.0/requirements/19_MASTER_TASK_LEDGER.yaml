handoff_schema: 2.0.0
project: prisoma
repository: https://github.com/sepahead/prisoma
frozen_commit: 0968128062f30da5c04f3f31c23f6ce8e0d95d36
release_target: 1.0.0
status: NO_GO_PENDING_IMPLEMENTATION_AND_EVIDENCE
lead_agents: 1
max_concurrent_subagents: 3
phase_count: 16
task_count: 240
twenty_lenses:
- id: L01
  name: Claims and scope
  question: Could a reasonable reader infer a stronger scientific, engineering, security, or deployment claim than the retained evidence supports?
- id: L02
  name: First-principles semantics
  question: Are every estimand, event, intervention, diagnostic, outcome, state, transition, and refusal defined operationally rather than by
    suggestive names?
- id: L03
  name: Causal identification
  question: Are treatment assignment, pre-treatment timing, consistency, positivity, interference, confounding, censoring, and estimand identification
    assumptions explicit and defensible?
- id: L04
  name: Statistics and uncertainty
  question: Are sampling units, dependence, multiplicity, calibration, confidence intervals, missingness, power, stopping, and sensitivity analyses
    correct?
- id: L05
  name: PID and information theory
  question: Are population, measure, estimator, and application gates separate; are atoms, units, preprocessing, support, and refusal semantics
    scientifically valid?
- id: L06
  name: Type and state integrity
  question: Can invalid study, split, episode, run-log, capture, intervention, model, or protocol states be represented or silently promoted?
- id: L07
  name: Time, ordering, and replay
  question: Are source time, receipt time, landmark time, treatment time, outcome time, censoring time, epoch, sequence, restart, and replay semantics
    unambiguous?
- id: L08
  name: Identity and provenance
  question: Can every result be traced to exact code, dependency, model, checkpoint, hook, tensor, dataset, split, transform, seed, configuration,
    and source artifact?
- id: L09
  name: Data rights, privacy, and ethics
  question: Are licenses, consent, personal data, human-subject issues, dataset rights, redaction, retention, and redistribution addressed before
    capture or release?
- id: L10
  name: Security and hostile inputs
  question: Can malformed JSON/NPZ/run logs, paths, bridges, NCP frames, model artifacts, or authenticated malicious peers corrupt state, escape
    confinement, or cause unsafe behavior?
- id: L11
  name: Resource bounds and denial of service
  question: Are bytes, rows, dimensions, events, episodes, artifacts, queues, requests, retries, logs, memory, CPU, disk, and session lifetime
    bounded before expensive work?
- id: L12
  name: Concurrency, lifecycle, and crash consistency
  question: Are append/ack ordering, partial writes, fsync scope, cancellation, shutdown, retries, restart, poisoned state, and cross-file transactions
    specified and tested?
- id: L13
  name: Determinism and reproducibility
  question: Can a clean party reproduce builds, generated governance files, fixtures, randomization, simulations, metrics, reports, and package
    bytes?
- id: L14
  name: API, schema, and SemVer
  question: Is the stable surface minimal and versioned; are unknown fields, migration, panic, allocation, feature, and compatibility rules explicit?
- id: L15
  name: Baselines and falsification
  question: Are strong non-PID comparators, negative controls, placebo checks, shuffled controls, odd/quirky cases, and simpler explanations tested
    fairly?
- id: L16
  name: Holdout and contamination control
  question: Are tuning and evaluation separated; is access auditable; are transforms fitted train-only; are task/model/family leakage and off-repo
    access considered?
- id: L17
  name: Verification and evidence quality
  question: 'Does each claim have the right evidence tier: unit/property/model, independent oracle, formal proof, blind holdout, external benchmark,
    or real study?'
- id: L18
  name: Ecosystem composition
  question: Are pid-rs, NCP, Engram, Crebain, Galadriel, Haldir, SAFE, Rerun, ROS, and external tools integrated without hidden coupling or authority
    confusion?
- id: L19
  name: Human factors and thesis defensibility
  question: Can a reviewer understand the theory, assumptions, negative results, status, commands, evidence, and limits without being a Rust expert?
- id: L20
  name: Counterfactual misuse and future maintenance
  question: How could a rushed researcher, malicious source, overconfident paper, or future maintainer misuse a convenience path or reinterpret
    a result?
tasks:
- id: T000
  phase_id: P00
  phase_title: Freeze current head, inventory every file, and establish truthful baseline
  title: Freeze exact Git, submodule, dependency, toolchain, dataset, model, and external-repository identities.
  priority: P0_RELEASE_BLOCKER
  dependencies: []
  execution_wave: 0
  subagent_lane: 1
  mandatory_path_scope:
  - '*'
  - .gitmodules
  - Cargo.lock
  - uv.lock
  current_head: 0968128062f30da5c04f3f31c23f6ce8e0d95d36
  head_mismatch_rule: STOP before editing if HEAD, submodule identity, generated inputs, or relevant upstream release identity changed; produce
    a diff and re-open affected requirements.
  preconditions:
  - Exact clean Prisoma commit and pid-rs submodule identity are recorded.
  - Every relevant tracked file and generated source is listed in the assignment.
  - Current behavior and public claim tier are documented before code changes.
  - Ambiguities and counterexamples are written before selecting semantics.
  procedure:
  - Read every in-scope file line by line and update FILE_REVIEW_LEDGER.csv with blob and SHA-256 identities.
  - Map each input, state, time, identity, output, failure, resource limit, assumption, and public statement.
  - Write normative SHALL/SHALL NOT requirements with stable identifiers.
  - Construct simple, odd, boundary, malformed, stale, replayed, missing, shifted, and adversarial counterexamples.
  - Implement the smallest coherent change; delete or quarantine contradictory fallback and historical paths.
  - Add unit, boundary, negative, property/metamorphic, fuzz, state-machine, statistical, and integration tests appropriate to the claim.
  - Generate evidence tied to exact code, tools, configuration, seeds, hardware, datasets, models, splits, and raw outputs.
  - Update schemas, migration, docs, claim registry, capability matrix, and exact dependency identities.
  - Run the local subsystem gate, complete wave gate, and every affected cross-repository conformance check.
  - Obtain independent review; record residual assumptions and claim impact.
  mandatory_adversarial_questions:
  - What invalid or misleading state can still be represented through JSON, Rust API, Python API, CLI, fixture, migration, or manual file edit?
  - What happens at empty, minimum, maximum, duplicate, stale, reordered, replayed, future-dated, censored, partially initialized, and shutdown
    boundaries?
  - Can a failed prerequisite, absent optional component, missing label, abstention, parse error, timeout, or exhausted capacity become a positive
    result?
  - Can tuning, visualization, derived artifacts, model selection, or off-repository access leak holdout information?
  - Can a green synthetic or in-process test pass while the real scientific, security, or deployment claim is false?
  - Could a reviewer reasonably confuse this output with evidence for H1, H2, H3, H4, EC1, causal use, safety, or PID validity?
  required_tests:
  - positive reference case
  - negative and malformed case
  - boundary and resource case
  - timing/leakage/replay case
  - property, metamorphic, or model-based case where applicable
  - independent or cross-implementation case
  - full regression and documentation example gate
  required_evidence:
  - requirement and claim IDs
  - file-review ledger updates
  - complete commands, logs, and exit statuses
  - raw and summarized metrics with uncertainty where relevant
  - exact source/dependency/model/data/split/profile identities
  - positive and negative fixtures or vectors
  - reviewer identity and review disposition
  - residual-risk and claim-language update

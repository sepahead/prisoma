[workspace]
resolver = "2"
members = [
    "crates/pid-bridge",
    "crates/pid-core",
    "crates/pid-python",
    "crates/pid-rerun",
    "crates/pid-runlog",
    "crates/pid-sim",
]
# `ncp-observer` is intentionally NOT a default member. It path-depends on the
# sibling `Paper2Brain/ncp` workspace (`../../../Paper2Brain/ncp/*`), which is not
# vendored here and is absent on a fresh checkout / CI runner. A broken path-dep in
# a default member poisons manifest resolution for the WHOLE workspace (every
# `cargo` command, including `-p`-scoped ones), so it is excluded to keep the
# self-contained crates (and CI) green. Build it explicitly when the sibling is
# present: `cargo build --manifest-path crates/ncp-observer/Cargo.toml`.
exclude = ["crates/ncp-observer"]

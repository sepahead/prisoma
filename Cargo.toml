[workspace]
resolver = "2"
members = [
    "crates/pid-bridge",
    "crates/pid-core",
    "crates/pid-python",
    "crates/pid-rerun",
    "crates/pid-runlog",
    "crates/pid-sim",
]
# `ncp-observer` is intentionally NOT a default member. It now git-depends on the
# published NCP SDK (https://github.com/sepehrmn/NCP, tag v0.1.0) and so resolves on
# a fresh checkout, but it pulls in NCP + Zenoh — deliberately kept OFF pid_vla's
# critical path (the pure-PID stack builds and gates with no NCP/Engram/Zenoh dep).
# Build/test it explicitly: `cargo build --manifest-path crates/ncp-observer/Cargo.toml`.
exclude = ["crates/ncp-observer"]

# PID-Splat Configuration File
# ============================
# 
# This file configures the modular simulation environment for prisoma experiments.
# See ARCHITECTURE.md §2.4 and DIAGRAMS.md §4 for architecture details.
#
# Quick Start:
#   - Fast prototyping: physics.backend = "rapier"
#   - Benchmark comparison (LIBERO/MetaWorld): physics.backend = "mujoco"
#   - Large-scale experiments: physics.backend = "isaac"
#
# Note:
# - This file describes the *proposed* PID‑Splat stack; not all backends are implemented in this repo.
# - Any performance numbers should be treated as targets/estimates until benchmarked on your hardware.

# =============================================================================
# PHYSICS BACKEND
# =============================================================================
# Select the physics engine for object simulation.
# Options: "rapier", "mujoco", "isaac"

[physics]
backend = "rapier"

# -----------------------------------------------------------------------------
# Rapier3D Configuration (Rust-native, fast, deterministic)
# Use when: Fast iteration, prototyping, deterministic replay
# Performance: benchmark on your scene/hardware
# -----------------------------------------------------------------------------
[physics.rapier]
step_hz = 1000                    # Internal physics rate (Hz)
substeps = 10                     # Substeps per control step
deterministic = true              # Attempt deterministic replay (engine/platform dependent; verify)
gravity = [0.0, 0.0, -9.81]       # Gravity vector (m/s²)

# Solver parameters
solver_iterations = 4             # Position solver iterations
stabilization_threshold = 0.001   # Contact stabilization threshold

# -----------------------------------------------------------------------------
# MuJoCo Configuration (strong contact-physics baseline)
# Use when: Accurate contact physics, benchmark comparison, dexterous manipulation
# Performance: benchmark on your setup; requires MuJoCo installation
# -----------------------------------------------------------------------------
[physics.mujoco]
model_path = "assets/mujoco/franka_tabletop.xml"  # MuJoCo XML model
step_hz = 500                     # Physics rate (Hz)
solver_iterations = 50            # Solver iterations
integrator = "implicit"           # Options: "euler", "implicit", "rk4"

# Contact parameters
cone_type = "elliptic"            # Friction cone: "pyramidal", "elliptic"
condim = 4                        # Contact dimensionality (1, 3, 4, or 6)

# Rendering (for debugging, not primary renderer)
offscreen_rendering = false       # Enable MuJoCo offscreen rendering

# -----------------------------------------------------------------------------
# Isaac Gym Configuration (GPU-parallel environments)
# Use when: Large-scale batch experiments and ablations
# Performance: batch scale is hardware- and environment-dependent; benchmark
# Requires: NVIDIA GPU, Isaac Gym installation
# -----------------------------------------------------------------------------
[physics.isaac]
gpu_id = 0                        # GPU device ID
num_envs = 1024                   # Number of parallel environments
use_gpu_pipeline = true           # GPU-accelerated physics pipeline
compute_device = "cuda:0"         # Compute device
graphics_device = "cuda:0"        # Graphics device (for debug rendering)

# Simulation parameters
dt = 0.0166                       # Timestep (60 Hz)
substeps = 2                      # Physics substeps per step
num_position_iterations = 4       # Position solver iterations
num_velocity_iterations = 0       # Velocity solver iterations

# =============================================================================
# ROBOT SIMULATION BACKEND
# =============================================================================
# Select the robot simulation backend.
# Options: "gazebo", "mujoco", "none"

[robot]
backend = "none"                  # Default for early bring-up (object-only)
urdf_path = "assets/robots/franka_panda.urdf"

# Coupling note:
# - If `robot.backend` and `physics.backend` differ and the robot is expected to physically contact objects,
#   you need an explicit coupling/co-simulation layer; otherwise contacts are not meaningful.
# - For contact-rich manipulation baselines, prefer `physics.backend = "mujoco"` and `robot.backend = "mujoco"`.

# -----------------------------------------------------------------------------
# Gazebo Harmonic Configuration (Industry-standard robot simulation)
# Use when: Accurate robot kinematics, sensor simulation, cross-embodiment
# Performance: benchmark (depends on sensors/plugins); requires Gazebo Harmonic installation
# -----------------------------------------------------------------------------
[robot.gazebo]
world_file = "assets/gazebo/tabletop_world.sdf"   # SDF world file
headless = true                   # Run without GUI
physics_engine = "bullet"         # Options: "bullet", "dart", "ode"
real_time_factor = 0.0            # 0.0 = as fast as possible

# Sensor configuration
camera_hz = 30                    # RGB-D camera rate
joint_state_hz = 100              # Joint state publishing rate

# ROS 2 bridge (optional)
ros_bridge_enabled = true
ros_domain_id = 0

# -----------------------------------------------------------------------------
# MuJoCo Robot Configuration (Legacy/benchmark compatibility)
# Use when: Matching robosuite/LIBERO baselines exactly
# -----------------------------------------------------------------------------
[robot.mujoco]
robot_xml = "assets/mujoco/franka_emika_panda.xml"
mount_type = "table"              # Options: "table", "floor", "wall"
gripper = "panda_gripper"         # Gripper model

# =============================================================================
# RENDERING BACKEND
# =============================================================================
# Rendering target: Gaussian splats via SparkJS (planned).
# Photorealism and throughput depend on capture quality, scene complexity, and GPU.

[rendering]
backend = "splat"                 # Fixed: always use Gaussian Splats
resolution = [1280, 720]          # Render resolution
target_fps = 60                   # Target frame rate

# -----------------------------------------------------------------------------
# SparkJS Configuration (WebGPU Gaussian Splat renderer)
# -----------------------------------------------------------------------------
[rendering.sparkjs]
splat_budget = 2_000_000          # Maximum splats to render
sort_mode = "gpu"                 # Options: "cpu", "gpu"
sh_degree = 3                     # Spherical harmonics degree (0-3)

# LOD (Level of Detail) settings
lod_enabled = true
lod_near = 0.5                    # Near distance (m)
lod_far = 10.0                    # Far distance (m)

# PID Dyno shaders
dynos_enabled = true
dyno_blend_mode = "multiply"      # Options: "multiply", "add", "overlay"

# -----------------------------------------------------------------------------
# Camera Configuration
# -----------------------------------------------------------------------------
[rendering.camera]
fov = 60.0                        # Field of view (degrees)
near_clip = 0.01                  # Near clipping plane (m)
far_clip = 100.0                  # Far clipping plane (m)

# Default viewpoint
position = [0.8, 0.0, 0.6]        # Camera position (m)
target = [0.4, 0.0, 0.2]          # Look-at target (m)
up = [0.0, 0.0, 1.0]              # Up vector

# =============================================================================
# PID-CORE CONFIGURATION
# =============================================================================
# Settings for the PID estimator (I^sx_∩)

[pid]
estimator = "ehrlich_ksg"         # Options: "ehrlich_ksg", "gaussian" (synthetic only)
k = 5                             # k-NN parameter
metric = "chebyshev"              # Options: "chebyshev" (required for ISX)

# Windowing
window_size = 1000                # Samples per PID window
stride = 100                      # Stride between windows

# Raw m-sample stability percentiles from subsample resampling.
# These are not calibrated confidence intervals for the full-n estimator or population quantity.
bootstrap_enabled = true
bootstrap_samples = 100
percentile_tail_mass = 0.05
stability_interpretation = "raw_m_sample_percentiles_not_n_sample_confidence_intervals"

# Geometry validation (see EXPERIMENTS.md §4.0)
[pid.geometry_gate]
enabled = true
max_intrinsic_dim = 20            # Fail if intrinsic dim > this
min_gromov_delta_rel = 0.1        # Fail if δ_rel < this (tree-like); δ_rel = 2δ/diam under chosen metric
min_distance_cv = 0.1             # Fail if CV < this (distance concentration)

# =============================================================================
# ZENOH MIDDLEWARE
# =============================================================================
# Zero-copy pub/sub for inter-process communication

[zenoh]
mode = "peer"                     # Options: "peer", "client", "router"
listen = ["tcp/127.0.0.1:7447"]   # Listen endpoints
connect = []                      # Connect endpoints (for client mode)

# Topics
[zenoh.topics]
vla_action = "vla/action"
vla_embeddings = "vla/embeddings"
sim_sensors = "sim/sensors"
pid_metrics = "pid/metrics"
dream_flow = "dream/flow"

# =============================================================================
# AGENT BRIDGE (CONTROL PLANE)
# =============================================================================
# A local automation interface for GUI + scripts + LLM tools (planned).
# The UI should call the same API so experiments are replayable (see grandplan.md §11.4).

[agent_bridge]
enabled = true
transport = "ws_jsonrpc"          # JSON-RPC 2.0 over WebSocket
listen = "127.0.0.1:9123"         # Local-only by default
allow_remote = false              # Do not bind 0.0.0.0 unless explicitly intended
require_token = true              # Require a per-session token/handshake
read_only_default = true          # Default external sessions to inspection-only
audit_log = "logs/agent_bridge.jsonl"

# =============================================================================
# EXPERIMENT PRESETS
# =============================================================================
# Quick presets for common experiment configurations.
# Override individual settings above, or use a preset as a starting point.

[presets.fast_iteration]
# For rapid prototyping and debugging
physics.backend = "rapier"
robot.backend = "none"
rendering.target_fps = 30

[presets.benchmark_libero]
# For comparing against LIBERO/robosuite baselines
physics.backend = "mujoco"
robot.backend = "mujoco"
physics.mujoco.model_path = "assets/mujoco/libero_kitchen.xml"

[presets.large_scale_ablation]
# For large-scale batch experiments
physics.backend = "isaac"
physics.isaac.num_envs = 4096
robot.backend = "none"

[presets.cross_embodiment]
# For Exp5 cross-embodiment replication (H4/H7) (Franka vs UR5e)
physics.backend = "mujoco"
robot.backend = "mujoco"
# Switch robot model (MJCF). If you only have URDFs, convert to MJCF as part of the asset pipeline.

# =============================================================================
# LOGGING & OUTPUT
# =============================================================================

[logging]
level = "info"                    # Options: "trace", "debug", "info", "warn", "error"
file = "logs/pid-splat.log"       # Log file path
console = true                    # Also log to console

[output]
results_dir = "results/"          # Experiment results directory
save_embeddings = true            # Save raw embeddings for post-hoc analysis
save_trajectories = true          # Save full episode trajectories
checkpoint_interval = 100         # Save checkpoint every N episodes

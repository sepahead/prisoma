# Pre-commit hooks for prisoma. Lightweight: secret scanning only.
# Install once with `pip install pre-commit && pre-commit install`.
#
# This hook blocks commits that would INTRODUCE secrets (API keys, tokens, private
# keys). It does NOT rotate secrets that are already committed or sitting in an
# untracked local file (e.g. `.env`) — that remains the operator's manual action.
#
# The `pid-rs/` git submodule and the vendored `.external/repos/*` trees are excluded:
# they are owned/scanned upstream and pre-commit only sees staged files in this repo
# anyway, but the explicit exclude keeps the scan fast and scoped to prisoma's own code.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        exclude: "^(pid-rs/|\\.external/)"

              - generic [ref=e131]:
                - heading "Overview " [level=2] [ref=e132]:
                  - link "Overview" [ref=e133] [cursor=pointer]:
                    - /url: "#id1"
                  - link "" [ref=e134] [cursor=pointer]:
                    - /url: "#overview"
                - paragraph [ref=e135]: ROS 2 includes the ability to secure communications among nodes within the ROS 2 computational graph. Similar to discovery, security happens through the underlying ROS 2 middleware (provided it has support for the corresponding security plugins). No additional software installation is needed to enable security; however, the middleware requires configuration files for each ROS graph participant. These files enable encryption and authentication, and define policies both for individual nodes and for the overall ROS graph. ROS 2 also adds a master “on/off” switch to control security behavior.
                - paragraph [ref=e136]:
                  - text: ROS utilities can create the authoritative
                  - link "trust anchor" [ref=e137] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Trust_anchor
                  - text: for a ROS application, or an external certificate authority can be used.
                - paragraph [ref=e138]: Built-in ROS 2 security features enable control over communications throughout the ROS graph. This not only allows for encrypting data in transit between ROS domain participants, but also enables authentication of participants sending data, ensures the integrity of data being sent, and enables domain-wide access controls.
                - paragraph [ref=e139]:
                  - text: ROS 2 security services are provided by the underlying
                  - link "Data Distribution Service (DDS)" [ref=e140] [cursor=pointer]:
                    - /url: https://www.omg.org/spec/DDS/
                  - text: which is used for communications between nodes. DDS vendors provide open source and commercial DDS implementations that work with ROS. However, in order to create a specification-compliant implementation of DDS, all vendors must include security plugins as outlined in the
                  - link "DDS Security Specification" [ref=e141] [cursor=pointer]:
                    - /url: https://www.omg.org/spec/DDS-SECURITY/About-DDS-SECURITY/
                  - text: . ROS security features take advantage of these DDS security plugins to provide policy-based encryption, authentication and access control. DDS and ROS security is enabled through predefined configuration files and environment variables.
              - generic [ref=e142]:
                - heading "The Security Enclave " [level=2] [ref=e143]:
                  - link "The Security Enclave" [ref=e144] [cursor=pointer]:
                    - /url: "#id2"
                  - link "" [ref=e145] [cursor=pointer]:
                    - /url: "#the-security-enclave"
                - paragraph [ref=e146]:
                  - text: A security enclave encapsulates a single policy for protecting ROS communications. The enclave may set policy for multiple nodes, for an entire ROS graph, or any combination of protected ROS processes and devices. Security enclaves can be flexibly mapped to processes, users, or devices at deployment. Adjusting this default behavior becomes important for optimizing communications and for complex systems. See the ROS 2 Security Enclaves
                  - link "design document" [ref=e147] [cursor=pointer]:
                    - /url: https://design.ros2.org/articles/ros2_security_enclaves.html
                  - text: for additional details.
              - generic [ref=e148]:
                - heading "Security Files " [level=2] [ref=e149]:
                  - link "Security Files" [ref=e150] [cursor=pointer]:
                    - /url: "#id3"
                  - link "" [ref=e151] [cursor=pointer]:
                    - /url: "#security-files"
                - paragraph [ref=e152]:
                  - text: A
                  - link "ROS 2 security enclave" [ref=e153] [cursor=pointer]:
                    - /url: https://design.ros2.org/articles/ros2_security_enclaves.html
                  - text: is established with six files as outlined by the DDS specification. Three of these files define an enclave’s identity, while three other files define the permissions to be granted to the enclave. All six files reside in a single directory, and nodes launched without a qualified enclave path use files in the default root level enclave.
                - generic [ref=e154]:
                  - heading "Enclave Identity " [level=3] [ref=e155]:
                    - link "Enclave Identity" [ref=e156] [cursor=pointer]:
                      - /url: "#id4"
                    - link "" [ref=e157] [cursor=pointer]:
                      - /url: "#enclave-identity"
                  - paragraph [ref=e158]:
                    - text: The Identity Certificate Authority file
                    - code [ref=e159]: identity_ca.cert.pem
                    - text: acts as the trust anchor used to identify participants. Each enclave also holds its unique identifying certificate in the file
                    - code [ref=e160]: cert.pem
                    - text: ", and the associated private key in the file"
                    - code [ref=e161]: key.pem
                    - text: . Because the
                    - code [ref=e162]: cert.pem
                    - text: certificate has been signed by identity certificate, when a participant presents this certificate to other domain members, they are able to validate the participant’s identity using their own copy of the identity certificate. This valid certificate exchange allows the enclave to securely establish trusted communications with other participants. The enclave does not not share the
                    - code [ref=e163]: key.pem
                    - text: private key, but only uses it for decryption and message signing.
                - generic [ref=e164]:
                  - heading "Enclave Permissions " [level=3] [ref=e165]:
                    - link "Enclave Permissions" [ref=e166] [cursor=pointer]:
                      - /url: "#id5"
                    - link "" [ref=e167] [cursor=pointer]:
                      - /url: "#enclave-permissions"
                  - paragraph [ref=e168]:
                    - text: The Permissions Certificate Authority file
                    - code [ref=e169]: permissions_ca.cert.pem
                    - text: serves as the trust anchor to grant permissions to security enclaves. This certificate is used to create the signed file
                    - code [ref=e170]: governance.p7s
                    - text: ", an XML document which defines domain-wide protection policies. Similarly the XML file"
                    - code [ref=e171]: permissions.p7s
                    - text: outlines permissions of this particular enclave and has been signed by the Permissions CA. Domain members use a copy of the permissions CA to validate these signed files and grant the requested access.
                  - paragraph [ref=e172]: Although these two certificate authorities enable separate workflows for identity and permissions, often the same certificate serves as both the identity and the permissions authority.
                - generic [ref=e173]:
                  - heading "Private Keys " [level=3] [ref=e174]:
                    - link "Private Keys" [ref=e175] [cursor=pointer]:
                      - /url: "#id6"
                    - link "" [ref=e176] [cursor=pointer]:
                      - /url: "#private-keys"
                  - paragraph [ref=e177]: The identity and permissions certificates also have associated private key files. Add new enclaves to the domain by signing their Certificate Signing Request (CSR) with the identity certificate’s private key. Similarly, grant permissions for a new enclave by signing a permissions XML document with the permission certificate’s private key.
              - generic [ref=e178]:
                - heading "Security Environment Variables " [level=2] [ref=e179]:
                  - link "Security Environment Variables" [ref=e180] [cursor=pointer]:
                    - /url: "#id7"
                  - link "" [ref=e181] [cursor=pointer]:
                    - /url: "#security-environment-variables"
                - paragraph [ref=e182]:
                  - text: The environment variable
                  - code [ref=e183]: ROS_SECURITY_ENABLE
                  - text: acts as the enclave’s master “on/off” switch for ROS 2 security features. Security has been turned off by default, so security features will not be enabled even when the proper security files are present. In order to enable ROS 2 security, set this environment variable to
                  - code [ref=e184]: "true"
                  - text: (case sensitive).
                - paragraph [ref=e185]:
                  - text: Once security has been enabled, the environment variable
                  - code [ref=e186]: ROS_SECURITY_STRATEGY
                  - text: defines how domain participants handle problems when launching participants. Security features depend on certificates and properly signed configuration files, yet by default, an improperly configured participant will still launch successfully but without security features. In order to enforce strict compliance with security settings and fail to launch non-compliant enclaves, set this environment variable to
                  - code [ref=e187]: Enforce
                  - text: (case sensitive).
                - paragraph [ref=e188]:
                  - text: Additional security-related environment variables can be found in the
                  - link "ROS 2 DDS-Security Integration design document" [ref=e189] [cursor=pointer]:
                    - /url: https://design.ros2.org/articles/ros2_dds_security.html
                  - text: . These variables generally assist ROS in managing enclaves and locating the security files.
              - generic [ref=e190]:
                - heading "Learn More " [level=2] [ref=e191]:
                  - link "Learn More" [ref=e192] [cursor=pointer]:
                    - /url: "#id8"
                  - link "" [ref=e193] [cursor=pointer]:
                    - /url: "#learn-more"
                - paragraph [ref=e194]:
                  - text: For more information and hands-on exercises enabling ROS 2 communications security, see the
                  - link "Setting up security" [ref=e195] [cursor=pointer]:
                    - /url: ../../Tutorials/Advanced/Security/Introducing-ros2-security.html
